name: flutter_movil
version: 0.1.0+1
description: Planner-EF - Gestión de tareas y planificación empresarial.
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.0
  # Firebase / Push Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  # Charts for Reports
  fl_chart: ^0.68.0
  # Biometric Authentication
  local_auth: ^2.2.0
  # Campo / Visita Cliente / Marcaje
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  image_picker: ^1.2.1
  flutter_local_notifications: ^20.1.0
  table_calendar: ^3.1.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
